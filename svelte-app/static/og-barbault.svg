<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Ecliptic wheel -->
  <circle cx="350" cy="350" r="220" fill="none" stroke="#1e293b" stroke-width="45"/>
  <circle cx="350" cy="350" r="197" fill="none" stroke="#334155" stroke-width="1"/>
  <circle cx="350" cy="350" r="242" fill="none" stroke="#334155" stroke-width="1"/>
  
  <!-- Planet dots on the wheel -->
  <circle cx="500" cy="260" r="8" fill="#a78bfa"/> <!-- Pluto ~304° -->
  <text x="500" y="248" text-anchor="middle" font-size="14" fill="#a78bfa" font-family="sans-serif">♇</text>
  
  <circle cx="230" cy="310" r="8" fill="#60a5fa"/> <!-- Uranus ~64° -->
  <text x="230" y="298" text-anchor="middle" font-size="14" fill="#60a5fa" font-family="sans-serif">♅</text>
  
  <circle cx="270" cy="560" r="8" fill="#fbbf24"/> <!-- Jupiter ~124° -->
  <text x="270" y="548" text-anchor="middle" font-size="14" fill="#fbbf24" font-family="sans-serif">♃</text>
  
  <circle cx="175" cy="380" r="10" fill="#3b82f6"/> <!-- Neptune ~4° -->
  <text x="175" y="368" text-anchor="middle" font-size="14" fill="#3b82f6" font-family="sans-serif">♆</text>

  <!-- Title -->
  <text x="750" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="bold" font-size="52" fill="#e2e8f0">Barbault Basket</text>
  <text x="750" y="260" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" fill="#94a3b8">Planetary Ecliptic Chart</text>
  
  <text x="750" y="340" text-anchor="middle" font-family="monospace" font-size="20" fill="#60a5fa">Kepler's Equation · Meeus Orbital Elements</text>
  <text x="750" y="380" text-anchor="middle" font-family="monospace" font-size="20" fill="#60a5fa">Barbault Cyclic Index · Zodiac Wheel</text>
  
  <text x="750" y="450" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" fill="#fbbf24">🪐 July 20, 2026 — The Basket Peaks</text>
  <text x="750" y="490" text-anchor="middle" font-family="monospace" font-size="16" fill="#94a3b8">Jupiter 4° Leo · Uranus 4° Gemini</text>
  <text x="750" y="520" text-anchor="middle" font-family="monospace" font-size="16" fill="#94a3b8">Neptune 4° Aries · Pluto 4° Aquarius</text>

  <text x="600" y="600" text-anchor="middle" font-family="monospace" font-size="16" fill="#475569">riziles.github.io/ferray-wasm-poc/barbault-basket</text>
</svg>
